name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist.'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os_name }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: darwin
            arch: arm64
            runner: macos-14
          - os_name: darwin
            arch: amd64
            runner: macos-13
          - os_name: linux
            arch: amd64
            runner: ubuntu-latest
          - os_name: linux
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/cli/go.mod
          cache: true
          cache-dependency-path: apps/cli/go.sum

      - name: resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: build
        working-directory: apps/cli
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.os_name }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p ../../dist
          BIN_NAME="pg-flux"
          OUT="../../dist/pg-flux-${{ matrix.os_name }}-${{ matrix.arch }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.Version=${{ steps.tag.outputs.tag }}" \
            -o "$OUT" \
            ./cmd/pg-flux
          file "$OUT" || true
          "$OUT" version || true

      - name: package
        shell: bash
        working-directory: dist
        run: |
          NAME="pg-flux-${{ matrix.os_name }}-${{ matrix.arch }}"
          mv "$NAME" pg-flux
          tar -czf "$NAME.tar.gz" pg-flux
          rm pg-flux
          ls -la

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pg-flux-${{ matrix.os_name }}-${{ matrix.arch }}
          path: dist/pg-flux-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: checksums
        working-directory: dist
        run: |
          ls -la
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: extract changelog entry
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          # Slice from "## [VERSION]" up to the next "## [" (or EOF).
          awk -v v="^## \\[${VERSION}\\]" '
            $0 ~ v {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md > /tmp/notes.md || true
          if [ ! -s /tmp/notes.md ]; then
            echo "pg-flux ${TAG}" > /tmp/notes.md
            echo "" >> /tmp/notes.md
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." >> /tmp/notes.md
          fi
          echo "notes_file=/tmp/notes.md" >> "$GITHUB_OUTPUT"

      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # Idempotent: if a release for the tag already exists, just upload to it.
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading assets."
            gh release upload "$TAG" \
              --repo "${{ github.repository }}" \
              --clobber \
              dist/*.tar.gz dist/SHA256SUMS
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "pg-flux $TAG" \
              --notes-file "${{ steps.changelog.outputs.notes_file }}" \
              dist/*.tar.gz dist/SHA256SUMS
          fi
