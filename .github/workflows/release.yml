name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist.'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os_name }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: darwin
            arch: arm64
            runner: macos-14
            # native build, no cross-compile flag needed
          - os_name: darwin
            arch: amd64
            runner: macos-14
            # cross-compile from arm64 → amd64 via Apple clang's -arch flag.
            # macos-13 runners are scarce and being phased out, so we build
            # the Intel Mac binary from an Apple Silicon runner instead.
            cc_arch: x86_64
          - os_name: linux
            arch: amd64
            runner: ubuntu-latest
          - os_name: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os_name: windows
            arch: amd64
            runner: ubuntu-latest
            goos: windows
            goarch: amd64
            binary: pg-flux.exe
            # CGO cross-compile: mingw-w64 provides x86_64-w64-mingw32-gcc
            mingw_pkg: gcc-mingw-w64-x86-64
            cc: x86_64-w64-mingw32-gcc
          - os_name: windows
            arch: arm64
            runner: ubuntu-latest
            goos: windows
            goarch: arm64
            binary: pg-flux.exe
            # CGO cross-compile: llvm-mingw provides aarch64-w64-mingw32-clang
            # Install via the llvm-mingw tarball since apt doesn't ship it.
            mingw_pkg: ""
            cc: aarch64-w64-mingw32-clang
            use_llvm_mingw: true

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: apps/cli/go.mod
          cache: true
          cache-dependency-path: apps/cli/go.sum

      - name: resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: install Windows cross-compiler (amd64)
        if: matrix.mingw_pkg != '' && matrix.mingw_pkg != null
        run: sudo apt-get install -y ${{ matrix.mingw_pkg }}

      - name: install Windows cross-compiler (arm64 via llvm-mingw)
        if: matrix.use_llvm_mingw == true
        run: |
          # llvm-mingw provides aarch64-w64-mingw32-clang for Windows/ARM64 cross-builds.
          LLVM_MINGW_VER="20240619"
          curl -sSfL -o /tmp/llvm-mingw.tar.gz \
            "https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VER}/llvm-mingw-${LLVM_MINGW_VER}-ucrt-ubuntu-20.04-x86_64.tar.gz"
          sudo tar -xzf /tmp/llvm-mingw.tar.gz -C /opt
          echo "/opt/llvm-mingw-${LLVM_MINGW_VER}-ucrt-ubuntu-20.04-x86_64/bin" >> "$GITHUB_PATH"

      - name: build
        working-directory: apps/cli
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos || matrix.os_name }}
          GOARCH: ${{ matrix.goarch || matrix.arch }}
        run: |
          mkdir -p ../../dist
          BINARY="${{ matrix.binary || 'pg-flux' }}"
          OUT="../../dist/$BINARY"

          # Windows cross-compile: set CC to the mingw/llvm-mingw compiler.
          if [ -n "${{ matrix.cc }}" ]; then
            export CC="${{ matrix.cc }}"
            echo "cross-compile: CC=$CC"
          fi

          # macOS amd64: wrap clang with -arch x86_64 (Apple Silicon runner).
          if [ -n "${{ matrix.cc_arch }}" ]; then
            CC_WRAP="$RUNNER_TEMP/cc-wrap"
            cat > "$CC_WRAP" <<EOF
          #!/usr/bin/env bash
          exec clang -arch ${{ matrix.cc_arch }} "\$@"
          EOF
            chmod +x "$CC_WRAP"
            export CC="$CC_WRAP"
            echo "cross-compile: CC=$CC_WRAP (-arch ${{ matrix.cc_arch }})"
          fi

          go build \
            -trimpath \
            -ldflags "-s -w -X main.Version=${{ steps.tag.outputs.tag }}" \
            -o "$OUT" \
            ./cmd/pg-flux

          file "$OUT" || true

          # Native runs only — cross-compiled binaries can't execute on the runner.
          if [ -z "${{ matrix.cc_arch }}" ] && [ -z "${{ matrix.cc }}" ]; then
            "$OUT" version || true
          fi

      - name: package
        shell: bash
        working-directory: dist
        run: |
          NAME="pg-flux-${{ matrix.os_name }}-${{ matrix.arch }}"
          if [[ "${{ matrix.os_name }}" == "windows"* ]]; then
            zip "$NAME.zip" pg-flux.exe
          else
            tar -czf "$NAME.tar.gz" pg-flux
            rm pg-flux
          fi
          ls -la

      - name: upload artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68cf7e19c7b48bb5a4dfaf4 # v4.6.2
        with:
          name: pg-flux-${{ matrix.os_name }}-${{ matrix.arch }}
          path: |
            dist/pg-flux-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz
            dist/pg-flux-${{ matrix.os_name }}-${{ matrix.arch }}.zip
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: download all artifacts
        uses: actions/download-artifact@cc203385981b7b7de4f5a7d4fd59f05d8571b83e # v4.2.1
        with:
          path: dist
          merge-multiple: true

      - name: checksums
        working-directory: dist
        run: |
          ls -la
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS || sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: extract changelog entry
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          # Slice from "## [VERSION]" up to the next "## [" (or EOF).
          awk -v v="^## \\[${VERSION}\\]" '
            $0 ~ v {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md > /tmp/notes.md || true
          if [ ! -s /tmp/notes.md ]; then
            echo "pg-flux ${TAG}" > /tmp/notes.md
            echo "" >> /tmp/notes.md
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." >> /tmp/notes.md
          fi
          echo "notes_file=/tmp/notes.md" >> "$GITHUB_OUTPUT"

      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ASSETS=$(ls dist/*.tar.gz dist/*.zip 2>/dev/null; echo dist/SHA256SUMS)
          # Idempotent: if a release for the tag already exists, just upload to it.
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading assets."
            gh release upload "$TAG" \
              --repo "${{ github.repository }}" \
              --clobber \
              $ASSETS
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "pg-flux $TAG" \
              --notes-file "${{ steps.changelog.outputs.notes_file }}" \
              $ASSETS
          fi
