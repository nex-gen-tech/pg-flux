name: docs

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "content/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: latest

      - name: install dependencies
        working-directory: apps/web
        run: bun install --frozen-lockfile

      - name: build site
        working-directory: apps/web
        env:
          BASE_PATH: /pg-flux
        run: bun run build

      - name: configure pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3b67ecce96d93de04e58b1 # v3.0.1
        with:
          path: apps/web/dist

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: deploy
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c531d4 # v4.0.4
