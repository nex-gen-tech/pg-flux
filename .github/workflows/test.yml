name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    name: unit + vet
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: pgflux
          POSTGRES_PASSWORD: pgflux
          POSTGRES_DB: pgflux
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pgflux"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        env:
          PGFLUX_TEST_DSN: postgres://pgflux:pgflux@localhost:5432/pgflux?sslmode=disable
        run: go test ./... -race -count=1 -timeout 5m

      - name: build binary
        run: go build -o pg-flux ./cmd/pg-flux

      - name: upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pg-flux-linux-amd64
          path: pg-flux
          retention-days: 7
